spring.application.name=vinylvault

# Server
server.port=8080

# Database (configured via environment variables for Docker/K8s)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vinylvault}
spring.datasource.username=${DB_USERNAME:vinyluser}
spring.datasource.password=${DB_PASSWORD:vinylpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
vinylvault.upload-dir=${UPLOAD_DIR:/app/uploads}

# JWT (BASE64-encoded secret, at least 256 bits / 32 bytes)
# This is the default for dev - in K8s, override with a real secret via env var
jwt.secret=${JWT_SECRET:VnlueWxWYXVsdFNlY3JldEtleVRoYXRJc0xvbmdFbm91Z2hGb3JIUzI1NkFsZ29yaXRobUF1dGg=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.mk.ukim.finki.vinylvault=INFO
logging.level.org.springframework.security=INFO
