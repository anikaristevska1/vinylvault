# VinylVault CI/CD Pipeline
# Reference: KIII-05 (GitHub Actions & GitLab CI/CD lecture)
#
# Triggers on push to main, production, test, develop
# Jobs:
#   1. lint           - Code quality with Super-Linter
#   2. test-backend   - Maven compile check
#   3. test-frontend  - npm build verification
#   4. build-and-push - Docker images to DockerHub (only on main/production)

name: VinylVault CI/CD

on:
  push:
    branches:
      - main
      - production
      - test
      - develop
  pull_request:
    branches:
      - main
      - production

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: anikaristevska/vinylvault-backend
  FRONTEND_IMAGE: anikaristevska/vinylvault-frontend

jobs:
  # ===== JOB 1: Lint Code =====
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter@v6
        continue-on-error: true
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false

          # Only validate infrastructure-as-code files
          VALIDATE_YAML: true
          VALIDATE_DOCKERFILE_HADOLINT: true

          # Disable language-specific linters
          VALIDATE_JAVA: false
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JAVASCRIPT_STANDARD: false
          VALIDATE_JSX: false
          VALIDATE_CSS: false
          VALIDATE_HTML: false
          VALIDATE_MARKDOWN: false
          VALIDATE_JSCPD: false
          VALIDATE_CHECKOV: false
          VALIDATE_GITLEAKS: false
          VALIDATE_NATURAL_LANGUAGE: false

  # ===== JOB 2: Backend tests =====
  test-backend:
    name: Test Backend (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify backend build
        working-directory: ./backend
        run: mvn clean compile -B

  # ===== JOB 3: Frontend tests =====
  test-frontend:
    name: Test Frontend (npm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  # ===== JOB 4: Build & Push Docker images =====
  # Only runs on push to main/production, not on PRs, test, or develop
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-frontend
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max